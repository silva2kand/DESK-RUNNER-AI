[application]
name = DESK-RUNNER-AI
version = 1.0.0
description = Desktop Listen and Runner AI

[audio]
# Microphone settings
energy_threshold = 300
dynamic_energy_threshold = True
pause_threshold = 0.8
phrase_threshold = 0.3
non_speaking_duration = 0.5

[speech_recognition]
# Google Speech Recognition settings
language = en-US
timeout = 5
phrase_time_limit = 5

[text_to_speech]
# TTS Engine settings
rate = 200
volume = 0.9

[logging]
level = INFO
format = %(asctime)s - %(levelname)s - %(message)s